<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novatech Asset Viewer | Logo_Company.jpeg</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --window-bg: rgba(20, 20, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --transition-speed: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Geist Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Noise Texture Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 10;
        }

        /* Ambient Glows */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 1;
        }
        .glow-1 { top: -10%; left: -10%; }
        .glow-2 { bottom: -10%; right: -10%; }

        .window {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 800px;
            background: var(--window-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: window-appear var(--transition-speed) forwards;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }

        @keyframes window-appear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .title-bar {
            height: 48px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-color);
        }

        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green { background: #28c840; }

        .title-text {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .content {
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, transparent 70%);
        }

        .image-wrapper {
            position: relative;
            cursor: crosshair;
            transition: var(--transition-speed);
        }

        .image-wrapper img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: var(--transition-speed);
        }

        .image-wrapper:hover img {
            transform: scale(1.05);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        }

        /* Decorative Scanlines effect on image */
        .image-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
            border-radius: 4px;
        }

        .status-bar {
            height: 40px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .info-item span::before {
            content: "[ ";
            opacity: 0.5;
        }
        .info-item span::after {
            content: " ]";
            opacity: 0.5;
        }

        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <main class="window">
        <div class="title-bar">
            <div class="controls">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div class="title-text">Novatech Asset Viewer — v1.0</div>
            <div style="width: 46px;"></div> <!-- Spacer for balance -->
        </div>

        <div class="content">
            <div class="image-wrapper">
                <img src="Logo_Company.jpeg" alt="Novatech Company Logo">
            </div>
        </div>

        <div class="status-bar">
            <div class="info-item">
                <span>FILE: Logo_Company.jpeg</span>
                <span>TYPE: Image/JPEG</span>
            </div>
            <div class="info-item">
                <span>STATUS: RENDERED</span>
                <span>SOURCE: Local FS</span>
            </div>
        </div>
        <div class="accent-bar"></div>
    </main>
</body>
</html>
